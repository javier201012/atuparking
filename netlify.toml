[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/create-checkout-session"
  to = "/.netlify/functions/create-checkout-session"
  status = 200

[[redirects]]
  from = "/api/availability"
  to = "/.netlify/functions/get-availability"
  status = 200

[[redirects]]
  from = "/api/admin/availability"
  to = "/.netlify/functions/update-availability"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200